<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfólio Luis Otavio</title>
    <link rel="stylesheet" href="estilos/style.css">
    <link rel="shortcut icon" href="favicon.svg" type="image/x-icon">
    <script src="https://kit.fontawesome.com/defe6f8683.js" crossorigin="anonymous"></script>
</head>
<body>
    <header>
        <nav id="menu">
            <ul>
                <li><a href="#ficha" class="link"><i class="fa-solid fa-house"></i></a></li>
                <li><a href="#skills" class="link"><i class="fa-solid fa-code-branch"></i></a></li>
                <li><a href="#formação" class="link"><i class="fa-solid fa-user-graduate"></i></a></li>
                <li><a href="#projetos" class="link"><i class="fa-solid fa-trowel-bricks"></i></a></li>
                <li><a href="#"><i class="fa-solid fa-moon"></i></a></li>
            </ul>
        </nav>

    </header>

    <main>
        <section id="ficha">
            <img class="foto" src="imagens/eu.jpeg" alt="Foto de Luis Otávio">
            <h1>Luis Otávio</h1>
            <p>Cursando Engenharia de Software Full Stack</p>
            <div id="social">
                <a href="https://github.com/luisootavioramos-max" target="_blank"><i class="fa-brands fa-square-github"></i></a>
                <a href="https://www.linkedin.com/in/luis-otavio-ramos-peixoto-a2b398364/" target="_blank"><i class="fa-brands fa-square-linkedin"></i></a>

            </div>
        
        </section>

        <section id="detalhes">

            <article id="skills">
                <h2><i class="fa-solid fa-code-branch"></i>Minhas Skills</h2>

                <div id="skill-container">
                    <div class="item">
                        <div class="info">
                            <span class="nome"><i class="fa-solid fa-code"></i> HTML5</span>
                            <span class="porcent">90%</span>
                        </div>
                        <div class="barra">
                            <div class="progresso" style="width: 90%;"></div>
                        </div>
                    </div>

                    <div class="item">
                        <div class="info">
                            <span class="nome"><i class="fa-solid fa-code"></i> CSS3</span>
                            <span class="porcent">80%</span>
                        </div>
                        <div class="barra">
                            <div class="progresso" style="width: 80%;"></div>
                        </div>
                    </div>

                    <div class="item">
                        <div class="info">
                            <span class="nome"><i class="fa-solid fa-code"></i> JavaScript</span>
                            <span class="porcent">50%</span>
                        </div>
                        <div class="barra">
                            <div class="progresso" style="width: 50%;"></div>
                        </div>
                    </div>

                </div>
                
            </article>

            <article id="formação">
                <h2><i class="fa-solid fa-user-graduate"></i>Minhas Formações</h2>

                <div class="formacao-container">
                    <div class="curso">
                        <p class="periodo">2026 - 2030</p>
                        <h3 class="instituicao">Universidade Padre Anchieta</h3>
                        <p class="titulacao">Bacharel em Engenharia de Software Full Stack</p>
                    </div>
                </div>
            </article>

            <article id="projetos">
                <h2><i class="fa-solid fa-trowel-bricks"></i>Meus Projetos</h2>

                <div class="projeto-container"></div>
            </article>

        </section>

    </main>

    <footer>

    </footer>
    <script src="scripts/script.js"></script>
</body>
</html>
